<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VTA Commerce</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100dvh;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        max-width: 420px;
        padding: 24px;
        text-align: center;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }

      p {
        color: #475569;
        font-size: 14px;
        line-height: 1.5;
        margin: 0;
      }

      a {
        color: #15803d;
        display: inline-block;
        font-weight: 700;
        margin-top: 16px;
      }

      button {
        background: #15803d;
        border: 0;
        border-radius: 10px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        margin-top: 18px;
        padding: 12px 18px;
      }

      .secondary {
        background: transparent;
        color: #334155;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VTA Commerce</h1>
      <p id="status">Connexion au serveur sécurisé de VTA Commerce.</p>
      <button type="button" id="retry">Réessayer</button>
      <button type="button" id="exit" class="secondary">Quitter</button>
      <a id="open" href="https://vtaerp.com">Ouvrir VTA Commerce</a>
    </main>
    <script>
      const appUrl = "https://vtaerp.com";
      const status = document.getElementById("status");
      const retry = document.getElementById("retry");
      const exit = document.getElementById("exit");

      function openApp() {
        if (!navigator.onLine) {
          status.textContent = "Connexion indisponible. Vérifiez Internet puis réessayez.";
          return;
        }
        status.textContent = "Connexion au serveur sécurisé de VTA Commerce.";
        window.location.href = appUrl;
      }

      retry.addEventListener("click", openApp);
      exit.addEventListener("click", () => {
        if (window.Capacitor?.Plugins?.App?.exitApp) {
          window.Capacitor.Plugins.App.exitApp();
        }
      });
      window.addEventListener("online", openApp);
      window.addEventListener("offline", () => {
        status.textContent = "Connexion indisponible. Vérifiez Internet puis réessayez.";
      });
      setTimeout(openApp, 400);
    </script>
  </body>
</html>
